<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>まこペット</title><link rel="stylesheet" href="style.css"></head>
<body><div class="phone">
<section id="todo" class="page active"><img src="todo.png" class="screen"><button class="hot editBtn" onclick="openEdit()"></button><button class="hot s1" onclick="score(3)"></button><button class="hot s2" onclick="score(2)"></button><button class="hot s3" onclick="score(2)"></button><button class="hot s4" onclick="score(4)"></button><button class="hot s5" onclick="score(1)"></button><button class="hot s6" onclick="score(2)"></button></section>
<section id="room" class="page"><img src="room.png" class="screen"><button class="hot pet" onclick="petTap()"></button><button class="hot roomFood" onclick="openInventory('food')"></button><button class="hot roomDress" onclick="openInventory('dress')"></button></section>
<section id="shop" class="page"><img src="shop.png" class="screen"><button class="hot f1" onclick="buyFood('おにぎり',10,15)"></button><button class="hot f2" onclick="buyFood('りんご',5,10)"></button><button class="hot f3" onclick="buyFood('ドーナツ',20,25)"></button><button class="hot f4" onclick="buyFood('パンケーキ',30,30)"></button><button class="hot d1" onclick="buyDress('ピンクリボン',15)"></button><button class="hot d2" onclick="buyDress('まるメガネ',15)"></button><button class="hot d3" onclick="buyDress('あかいぼうし',20)"></button><button class="hot d4" onclick="buyDress('天使のはね',30)"></button><button class="hot d5" onclick="buyDress('ピンクのワンピ',25)"></button><button class="hot d6" onclick="buyDress('ハートバッグ',20)"></button></section>
<section id="book" class="page"><img src="book.png" class="screen contain"></section>
<button class="navHot navTodo" onclick="showPage('todo')"></button><button class="navHot navRoom" onclick="showPage('room')"></button><button class="navHot navShop" onclick="showPage('shop')"></button><button class="navHot navBook" onclick="showPage('book')"></button>
<div class="realHud"><span>⭐ <b id="points">25</b>pt</span><span id="bellyBox">おなか <b id="belly">32</b>/50</span></div>
<div id="toast" class="toast hidden"></div>
<div id="modal" class="modal hidden"><div class="panel"><button class="close" onclick="closeModal()">×</button><h2 id="modalTitle">もちもの</h2><div id="modalBody" class="modalBody"></div></div></div>
<div id="editModal" class="modal hidden"><div class="panel"><button class="close" onclick="closeEdit()">×</button><h2>やること編集</h2><label>科目</label><input id="subjectInput" value="こくご"><label>ドリル名</label><input id="drillInput" value="Z会 エブリスタディ"><label>進捗</label><div class="row"><input id="nowInput" type="number" value="18"><span>/</span><input id="totalInput" type="number" value="30"></div><label>期限</label><input id="dateInput" type="date"><button class="saveBtn" onclick="saveEdit()">保存</button><p class="note">※今は試作なので、保存するとメモだけ更新します。</p></div></div>
</div><script src="app.js"></script></body></html>
