<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>まこペット</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <section id="start" class="screen">
    <img src="start_screen.png" class="bg" alt="たまご選択">
    <button class="eggBtn sky" onclick="chooseEgg('そらいろのたまご')"></button>
    <button class="eggBtn heart" onclick="chooseEgg('ハートのたまご')"></button>
    <button class="eggBtn cat" onclick="chooseEgg('ねこのたまご')"></button>
  </section>

  <section id="home" class="home hidden">
    <div class="homeCard">
      <h1>🌸 まこペット 🌸</h1>
      <p id="msg">たまごをおうちにつれて帰ったよ！</p>
      <div id="egg" class="bigEgg">🥚</div>
      <div class="bar"><span id="fill"></span></div>
      <p>🍙 おなか <span id="belly">0</span>/50</p>
      <p>⭐ ポイント <span id="points">0</span>pt</p>
      <button onclick="study()">📚 勉強した！ +5pt</button>
      <button onclick="feed()">🍙 ごはんをあげる 5pt</button>
      <button onclick="resetAll()" class="sub">最初から</button>
    </div>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
