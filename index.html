<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>まこペット</title><link rel="stylesheet" href="style.css"></head><body><div class="phone">
<section id="todo" class="page active htmlPage"><div class="todoHeader"><h1>やること</h1><button onclick="openTaskEditor()">＋ 教材</button></div><div class="summary"><div><small>今日のポイント</small><b><span id="todayPoints">0</span> / <span id="dailyGoal">25</span> pt</b></div><div><small>もってるポイント</small><b>⭐ <span id="pointsTop">25</span> pt</b></div></div><div id="taskList" class="taskList"></div></section>
<section id="room" class="page imagePage"><img src="room.png" class="screen"><button class="hot pet" onclick="petTap()"></button><button class="hot roomFood" onclick="openInventory('food')"></button><button class="hot roomDress" onclick="openInventory('dress')"></button></section>
<section id="shop" class="page imagePage"><img src="shop.png" class="screen"><button class="hot f1" onclick="buyFood('おにぎり',10,15)"></button><button class="hot f2" onclick="buyFood('りんご',5,10)"></button><button class="hot f3" onclick="buyFood('ドーナツ',20,25)"></button><button class="hot f4" onclick="buyFood('パンケーキ',30,30)"></button><button class="hot d1" onclick="buyDress('ピンクリボン',15)"></button><button class="hot d2" onclick="buyDress('まるメガネ',15)"></button><button class="hot d3" onclick="buyDress('あかいぼうし',20)"></button><button class="hot d4" onclick="buyDress('天使のはね',30)"></button><button class="hot d5" onclick="buyDress('ピンクのワンピ',25)"></button><button class="hot d6" onclick="buyDress('ハートバッグ',20)"></button></section>
<section id="book" class="page imagePage"><img src="book.png" class="screen contain"></section>
<nav class="bottomNav"><button onclick="showPage('todo')" id="nav-todo" class="on">📚<br>やること</button><button onclick="showPage('room')" id="nav-room">🏠<br>おへや</button><button onclick="showPage('shop')" id="nav-shop">🛒<br>ショップ</button><button onclick="showPage('book')" id="nav-book">📖<br>ずかん</button></nav>
<div id="roomHud" class="roomHud hidden"><span>⭐ <b id="pointsHud">25</b>pt</span><span>おなか <b id="bellyHud">32</b>/50</span></div><div id="toast" class="toast hidden"></div>
<div id="modal" class="modal hidden"><div class="panel"><button class="close" onclick="closeModal()">×</button><h2 id="modalTitle">もちもの</h2><div id="modalBody" class="modalBody"></div></div></div>
<div id="taskEditor" class="modal hidden"><div class="panel editorPanel"><button class="close" onclick="closeTaskEditor()">×</button><h2 id="editorTitle">教材を追加</h2><input type="hidden" id="editId"><label>科目</label><select id="subjectInput"><option>こくご</option><option>さんすう</option><option>かんじ</option><option>けいさん</option><option>えいご</option><option>そのた</option></select><label>ドリル名</label><input id="nameInput" placeholder="例：Z会 エブリスタディ"><label>進捗</label><div class="row"><input id="nowInput" type="number" min="0" value="0"><span>/</span><input id="totalInput" type="number" min="1" value="30"></div><label>優先度</label><select id="priorityInput"><option>高</option><option>中</option><option>低</option></select><label>期限</label><input id="dateInput" type="date"><button class="saveBtn" onclick="saveTask()">保存</button><button id="deleteBtn" class="deleteBtn hidden" onclick="deleteTask()">削除</button></div></div>
</div><script src="app.js"></script></body></html>
