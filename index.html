<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>まこペット おへや</title><link rel="stylesheet" href="style.css"></head><body>
<div class="app">
<header><div class="stat">🍙 おなか <b id="belly">35</b>/50</div><div class="stat">⭐ <b id="points">25</b>pt</div></header>
<main>
<section class="room">
<div class="window"></div><div class="bed">🛏️</div><div class="rug"></div>
<div id="pet" onclick="petTap()">🐱</div>
<div id="bubble">ごはん、たべたいな♪</div>
<div id="spark" class="hidden">✨</div>
</section>
<div class="bar"><span id="fill"></span></div>
<div id="next">あと15ptで成長！</div>
<section class="buttons"><button onclick="openFood()">🍙<br>ごはん</button><button onclick="openDress()">🎀<br>きせかえ</button></section>
</main>
<nav><button>📚<br>やること</button><button class="active">🏠<br>おへや</button><button>🛒<br>ショップ</button><button>📖<br>ずかん</button></nav>

<div id="foodModal" class="modal hidden"><div class="panel"><button class="close" onclick="closeModal()">×</button><h2>ごはん</h2><div class="grid">
<button onclick="feed(5,'りんご')">🍎<span>りんご</span><b>5pt</b></button>
<button onclick="feed(10,'おにぎり')">🍙<span>おにぎり</span><b>10pt</b></button>
<button onclick="feed(15,'サンドイッチ')">🥪<span>サンドイッチ</span><b>15pt</b></button>
<button onclick="feed(20,'ドーナツ')">🍩<span>ドーナツ</span><b>20pt</b></button>
<button onclick="feed(25,'おさかな')">🐟<span>おさかな</span><b>25pt</b></button>
<button onclick="feed(35,'ステーキ')">🥩<span>ステーキ</span><b>35pt</b></button>
<button class="wide" onclick="feed(50,'たんじょうびケーキ')">🎂<span>たんじょうびケーキ</span><b>50pt</b></button>
</div></div></div>

<div id="dressModal" class="modal hidden"><div class="panel"><button class="close" onclick="closeModal()">×</button><h2>きせかえ</h2><div class="preview"><span id="hat"></span><span id="dressPet">🐱</span><span id="ribbon"></span></div><div class="grid">
<button onclick="dress('ribbon')">🎀<span>リボン</span></button><button onclick="dress('hat')">👒<span>ぼうし</span></button><button onclick="dress('crown')">👑<span>王冠</span></button><button onclick="dress('glasses')">👓<span>めがね</span></button>
</div></div></div>
</div><script src="app.js"></script></body></html>
