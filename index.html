<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>まこペット Ver2.3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <div class="game">
    <img src="makopet_art_ui.png" class="bg" alt="まこペット">

    <div id="sparkLayer" class="sparkLayer"></div>

    <div class="topScore">
      <div>今日</div>
      <strong><span id="todayPoints">0</span>pt</strong>
    </div>

    <div class="rewardBox">
      <div class="rewardTitle">つぎのごほうび</div>
      <div id="nextReward">10ptで ごはん🍎</div>
      <div class="meter"><span id="rewardFill"></span></div>
    </div>

    <div id="bubble" class="bubble">今日も会えて<br>うれしいにゃ♡</div>
    <div id="heartFx" class="heartFx hidden">💕</div>

    <section class="taskPanel">
      <h2>きょうのやること</h2>
      <div id="tasks"></div>
      <button class="addBtn" onclick="addTask()">＋ やること追加</button>
    </section>

    <section class="actionPanel">
      <button onclick="feed()">🍎 ごはん<br><small>10pt</small></button>
      <button onclick="present()">🎁 プレゼント<br><small>30pt</small></button>
      <button onclick="newEgg()">🥚 たまご<br><small>100pt</small></button>
    </section>

    <section class="statusPanel">
      <div>❤️ なかよし <b id="friend">50</b></div>
      <div>🍖 おなか <b id="hunger">70</b></div>
      <div>🔥 連続 <b id="streak">0</b>日</div>
    </section>

    <section class="collectionPanel">
      <h2>ずかん</h2>
      <div id="collection"></div>
    </section>

    <nav class="bottomNav">
      <button onclick="say('ホームだにゃ♡')">🏠<br>ホーム</button>
      <button onclick="say('今日のがんばりを記録するにゃ')">📒<br>きろく</button>
      <button onclick="say('ポイントでごほうびをもらえるにゃ')">🎁<br>ごほうび</button>
      <button onclick="resetData()">⚙️<br>リセット</button>
    </nav>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
