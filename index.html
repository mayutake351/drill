<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>まこペット ショップ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone">
  <img src="shop_screen.png" class="screen" alt="まこペット ショップ">

  <button class="hot f1" onclick="buyFood('おにぎり',10)"></button>
  <button class="hot f2" onclick="buyFood('りんご',5)"></button>
  <button class="hot f3" onclick="buyFood('ドーナツ',20)"></button>
  <button class="hot f4" onclick="buyFood('パンケーキ',30)"></button>

  <button class="hot d1" onclick="buyDress('ピンクリボン',15)"></button>
  <button class="hot d2" onclick="buyDress('まるメガネ',15)"></button>
  <button class="hot d3" onclick="buyDress('あかいぼうし',20)"></button>
  <button class="hot d4" onclick="buyDress('天使のはね',30)"></button>
  <button class="hot d5" onclick="buyDress('ピンクのワンピ',25)"></button>
  <button class="hot d6" onclick="buyDress('ハートバッグ',20)"></button>

  <button class="hot navTodo" onclick="toast('やることへ')"></button>
  <button class="hot navRoom" onclick="toast('おへやへ')"></button>
  <button class="hot navShop" onclick="toast('ショップ')"></button>
  <button class="hot navBook" onclick="toast('ずかんへ')"></button>

  <div id="toast" class="toast hidden"></div>
</div>
<script src="app.js"></script>
</body>
</html>
