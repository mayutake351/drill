<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>まこペット Visual App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone">
  <img src="app_mock.png" class="mock" alt="まこペット画面">

  <!-- クリックできる透明ボタン -->
  <button class="hot home" onclick="showToast('おへやだよ')"></button>
  <button class="hot food" onclick="openFood()"></button>
  <button class="hot dress" onclick="showToast('きせかえ画面は次に作るよ')"></button>
  <button class="hot album" onclick="showToast('ずかんを開いたよ')"></button>
  <button class="hot forest" onclick="showToast('まほうの森へ！')"></button>
  <button class="hot pet" onclick="petReaction()"></button>

  <div id="toast" class="toast hidden"></div>

  <div id="foodModal" class="modal hidden">
    <div class="panel">
      <button class="close" onclick="closeFood()">×</button>
      <h2>ごはんをあげる</h2>
      <div class="foods">
        <button onclick="feed('りんご',5)">🍎<span>りんご</span><b>5pt</b></button>
        <button onclick="feed('おにぎり',10)">🍙<span>おにぎり</span><b>10pt</b></button>
        <button onclick="feed('サンドイッチ',15)">🥪<span>サンドイッチ</span><b>15pt</b></button>
        <button onclick="feed('ドーナツ',20)">🍩<span>ドーナツ</span><b>20pt</b></button>
        <button onclick="feed('おさかな',25)">🐟<span>おさかな</span><b>25pt</b></button>
        <button onclick="feed('ステーキ',35)">🥩<span>ステーキ</span><b>35pt</b></button>
        <button onclick="feed('たんじょうびケーキ',50)" class="special">🎂<span>たんじょうびケーキ</span><b>50pt</b></button>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
