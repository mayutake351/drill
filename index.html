<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>まこペット ショップ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone">
  <img src="shop_screen.png" class="screen" alt="まこペット ショップ">

  <button class="hot tabFood" onclick="toast('ごはんコーナー')"></button>
  <button class="hot tabDress" onclick="toast('きせかえコーナー')"></button>

  <button class="hot buyFood1" onclick="buy('りんご',5,'food')"></button>
  <button class="hot buyFood2" onclick="buy('おにぎり',10,'food')"></button>
  <button class="hot buyFood3" onclick="buy('ドーナツ',20,'food')"></button>
  <button class="hot buyFood4" onclick="buy('パンケーキ',30,'food')"></button>

  <button class="hot buyDress1" onclick="buy('ピンクリボン',15,'dress')"></button>
  <button class="hot buyDress2" onclick="buy('まるメガネ',15,'dress')"></button>
  <button class="hot buyDress3" onclick="buy('あかいぼうし',20,'dress')"></button>
  <button class="hot buyDress4" onclick="buy('天使のはね',30,'dress')"></button>
  <button class="hot buyDress5" onclick="buy('ピンクのワンピ',25,'dress')"></button>
  <button class="hot buyDress6" onclick="buy('ハートバッグ',20,'dress')"></button>

  <button class="hot navTodo" onclick="toast('やることへ')"></button>
  <button class="hot navRoom" onclick="toast('おへやへ')"></button>
  <button class="hot navBook" onclick="toast('ずかんへ')"></button>

  <div id="toast" class="toast hidden"></div>

  <div id="statePanel" class="statePanel">
    <b>購入メモ</b>
    <div id="ownedText">まだ何も買っていません</div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
