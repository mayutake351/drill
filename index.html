<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>まこペット</title>
<link rel="stylesheet" href="./style.css?v=10">
</head>
<body>
<div class="phone">

<section id="todo" class="page active">
  <header class="todoHeader">
    <h1>やること</h1>
    <button class="addMain" id="addMainBtn">＋ 教材</button>
  </header>
  <div class="summary">
    <div><small>今日のポイント</small><b><span id="todayPoints">0</span> / <span id="dailyGoal">25</span> pt</b></div>
    <div><small>もってるポイント</small><b>⭐ <span id="pointsTop">25</span> pt</b></div>
  </div>
  <div id="taskList" class="taskList"></div>
</section>

<section id="room" class="page imagePage roomPage">
  <img src="./room.png" class="screen" alt="おへや">
  <div class="wearLayer" aria-hidden="true">
    <img id="wearRibbon" class="wearItem ribbon hidden" alt="">
    <img id="wearGlasses" class="wearItem glasses hidden" src="./accessories/glasses.png" alt="">
    <img id="wearHat" class="wearItem hat hidden" src="./accessories/hat.png" alt="">
  </div>
  <button class="roomAction foodAction" id="roomFoodBtn">ごはん</button>
  <button class="roomAction dressAction" id="roomDressBtn">きせかえ</button>
</section>

<section id="shop" class="page shopHtml">
  <header class="shopHeader">
    <h1>ショップ</h1>
    <div class="shopPoints">⭐ <span id="shopPoints">25</span> pt</div>
  </header>
  <div class="shopTabs">
    <button class="active" data-tab="foodShop">ごはん</button>
    <button data-tab="dressShop">きせかえ</button>
  </div>

  <div id="foodShop" class="shopPane active">
    <div class="shopGrid">
      <button class="shopCard" data-food="りんご" data-cost="5" data-value="10">
        <span class="itemEmoji">🍎</span><b>りんご</b><small>おなか +10</small><strong>5pt</strong>
      </button>
      <button class="shopCard" data-food="おにぎり" data-cost="10" data-value="15">
        <span class="itemEmoji">🍙</span><b>おにぎり</b><small>おなか +15</small><strong>10pt</strong>
      </button>
      <button class="shopCard" data-food="ドーナツ" data-cost="20" data-value="25">
        <span class="itemEmoji">🍩</span><b>ドーナツ</b><small>おなか +25</small><strong>20pt</strong>
      </button>
      <button class="shopCard" data-food="パンケーキ" data-cost="30" data-value="30">
        <span class="itemEmoji">🥞</span><b>パンケーキ</b><small>おなか +30</small><strong>30pt</strong>
      </button>
    </div>
  </div>

  <div id="dressShop" class="shopPane">
    <h2>リボン</h2>
    <div class="shopGrid">
      <button class="shopCard" data-dress="ピンクリボン" data-cost="15">
        <img src="./accessories/ribbon_pink.png"><b>ピンク</b><strong>15pt</strong>
      </button>
      <button class="shopCard" data-dress="水色リボン" data-cost="15">
        <img src="./accessories/ribbon_blue.png"><b>水色</b><strong>15pt</strong>
      </button>
      <button class="shopCard" data-dress="黄色リボン" data-cost="20">
        <img src="./accessories/ribbon_yellow.png"><b>黄色</b><strong>20pt</strong>
      </button>
      <button class="shopCard" data-dress="紫リボン" data-cost="25">
        <img src="./accessories/ribbon_purple.png"><b>紫</b><strong>25pt</strong>
      </button>
      <button class="shopCard" data-dress="緑リボン" data-cost="25">
        <img src="./accessories/ribbon_green.png"><b>緑</b><strong>25pt</strong>
      </button>
    </div>

    <h2>メガネ・ぼうし</h2>
    <div class="shopGrid">
      <button class="shopCard" data-dress="まるメガネ" data-cost="20">
        <img src="./accessories/glasses.png"><b>まるメガネ</b><strong>20pt</strong>
      </button>
      <button class="shopCard" data-dress="あかいぼうし" data-cost="30">
        <img src="./accessories/hat.png"><b>あかいぼうし</b><strong>30pt</strong>
      </button>
    </div>
  </div>
</section>

<section id="book" class="page imagePage">
  <img src="./book.png" class="screen contain" alt="ずかん">
</section>

<nav class="bottomNav">
  <button data-page="todo" id="nav-todo" class="on">📚<br>やること</button>
  <button data-page="room" id="nav-room">🏠<br>おへや</button>
  <button data-page="shop" id="nav-shop">🛒<br>ショップ</button>
  <button data-page="book" id="nav-book">📖<br>ずかん</button>
</nav>

<div id="roomHud" class="roomHud hidden">
  <span>⭐ <b id="pointsHud">25</b>pt</span>
  <span>おなか <b id="bellyHud">32</b>/50</span>
</div>

<div id="toast" class="toast hidden"></div>

<div id="itemModal" class="modal hidden">
  <div class="panel">
    <button class="close" id="closeItemModal">×</button>
    <h2 id="itemModalTitle">もちもの</h2>
    <div id="itemModalBody" class="modalBody"></div>
  </div>
</div>

<div id="taskEditor" class="modal hidden">
  <div class="panel editorPanel">
    <button class="close" id="closeTaskEditor">×</button>
    <h2 id="editorTitle">教材を追加</h2>
    <input type="hidden" id="editId">
    <label>科目</label>
    <select id="subjectInput">
      <option>こくご</option><option>さんすう</option><option>かんじ</option>
      <option>けいさん</option><option>えいご</option><option>そのた</option>
    </select>
    <label>ドリル名</label><input id="nameInput" placeholder="例：Z会 エブリスタディ">
    <label>進捗</label>
    <div class="row"><input id="nowInput" type="number" min="0" value="0"><span>/</span><input id="totalInput" type="number" min="1" value="30"></div>
    <label>優先度</label>
    <select id="priorityInput"><option>高</option><option>中</option><option>低</option></select>
    <label>期限</label><input id="dateInput" type="date">
    <button class="saveBtn" id="saveTaskBtn">保存</button>
    <button id="deleteBtn" class="deleteBtn hidden">削除</button>
  </div>
</div>

</div>
<script src="./app.js?v=10"></script>
</body>
</html>
