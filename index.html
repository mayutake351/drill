<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>まこペット</title><link rel="stylesheet" href="style.css"></head><body>
<div id="app">
<header><div class="profile">👧 <b>まこ</b></div><div class="pill">🍙 <b id="belly">45</b>/50</div><div class="pill">⭐ <b id="points">25</b>pt</div><button>🔔</button><button>⚙️</button></header>
<main>
<section id="home" class="page active">
 <div class="room"><div class="window"></div><div class="tower">🐱<br>🪵</div><div id="pet" onclick="pet()">🐱</div><div id="speech">おなかすいたよ〜<br>ごはんちょうだい♪</div><div class="old">😴🐈　🐈‍⬛💤　🐉</div></div>
 <div class="actions"><button onclick="openFeed()">🍙<br>ごはん</button><button onclick="pet()">✋<br>なでる</button><button onclick="show('closet')">👗<br>きせかえ</button><button onclick="show('room')">🛋️<br>おへや</button></div>
</section>
<section id="tasks" class="page"><h1>📚 やること</h1><div id="taskList"></div><button class="primary" onclick="addTask()">＋ タスク追加</button></section>
<section id="forest" class="page"><h1>🌳 まほうの森</h1><div class="forest"><button onclick="alert('たまご発見！')">🥚</button><button onclick="alert('たまご発見！')">🥚</button><button onclick="alert('たまご発見！')">🥚</button></div></section>
<section id="shop" class="page"><h1>🛒 ショップ</h1><div class="tabs"><button onclick="shop('food')">ごはん</button><button onclick="shop('dress')">きせかえ</button><button onclick="shop('furniture')">家具</button></div><div id="shopItems" class="grid"></div></section>
<section id="album" class="page"><h1>📖 ずかん</h1><div class="grid"><div>🐱<br>くいしんぼう</div><div>🐱<br>まねきねこ</div><div>🐯<br>とらねこ</div><div>🐈‍⬛<br>くろねこ</div><div>🪽🐱<br>はねねこ</div><div>🧙‍♀️🐱<br>まほうねこ</div></div></section>
<section id="closet" class="page"><h1>👗 クローゼット</h1><div class="dressPet">🐱</div><div class="grid"><button>🎀 リボン</button><button>👓 めがね</button><button>👒 ぼうし</button><button>👗 ワンピ</button><button>👜 バッグ</button><button>🪽 はね</button></div></section>
<section id="room" class="page"><h1>🛋️ おへや</h1><div class="room mini"><div id="pet">🐱</div><div class="old">🐈 🐈‍⬛ 🐉 🐶</div></div></section>
</main>
<nav><button onclick="show('home')">🏠<br>おへや</button><button onclick="show('tasks')">📚<br>やること</button><button onclick="show('forest')">🌳<br>もり</button><button onclick="show('shop')">🛒<br>ショップ</button><button onclick="show('album')">📖<br>ずかん</button></nav>
<div id="feed" class="modal hidden"><div class="card"><button class="close" onclick="closeFeed()">×</button><h2>🍙 ごはんをあげる</h2><div class="grid"><button onclick="feed(5,'りんご')">🍎<br>りんご<br>5pt</button><button onclick="feed(10,'おにぎり')">🍙<br>おにぎり<br>10pt</button><button onclick="feed(15,'サンドイッチ')">🥪<br>サンドイッチ<br>15pt</button><button onclick="feed(20,'ドーナツ')">🍩<br>ドーナツ<br>20pt</button><button onclick="feed(25,'おさかな')">🐟<br>おさかな<br>25pt</button><button onclick="feed(35,'ステーキ')">🥩<br>ステーキ<br>35pt</button><button onclick="feed(50,'たんじょうびケーキ')">🎂<br>たんじょうびケーキ<br>50pt</button></div></div></div>
</div><script src="app.js"></script></body></html>
