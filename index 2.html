<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>まこペット</title>
<style>
:root{--bg:#fff7fb;--card:#fff;--ink:#332837;--muted:#7d707b;--pink:#ef7fbc;--line:#f1d9e6}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(#fff7fb,#fffdf7);color:var(--ink)}main{max-width:760px;margin:0 auto;padding:18px 14px 90px}h1{text-align:center;font-size:30px;margin:10px 0 2px;color:#f06eaa}.sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;margin:12px 0;box-shadow:0 5px 16px rgba(150,70,120,.08)}.petroom{text-align:center;background:linear-gradient(#fff4dc,#fff);position:relative;overflow:hidden}.coin{position:absolute;right:14px;top:12px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-weight:800}.egg,.cat{font-size:118px;line-height:1;margin:20px 0 8px;filter:drop-shadow(0 10px 12px rgba(0,0,0,.12))}.egg{animation:wobble 3s infinite}@keyframes wobble{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}.speech{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px 14px;margin:8px 0;color:#5f4f5a}.bar{height:16px;background:#f5e8f0;border-radius:999px;overflow:hidden;margin:10px auto;max-width:340px}.fill{height:100%;background:linear-gradient(90deg,#ef7fbc,#ffc15e);width:0%}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}button,input,select{font:inherit;border-radius:14px;border:1px solid var(--line);padding:12px;width:100%}button{background:var(--pink);color:white;border:0;font-weight:800}button.secondary{background:#f5edf3;color:var(--ink)}button.small{padding:8px 10px;font-size:13px;width:auto;margin:3px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row3{display:grid;grid-template-columns:1.3fr .7fr .7fr;gap:8px}label{display:block;font-size:13px;color:var(--muted);margin:8px 0 4px}.task{display:flex;gap:10px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:14px;margin:8px 0;background:#fff}.task input{width:auto}.task.done{opacity:.55;text-decoration:line-through}.drill{padding:12px;border:1px solid var(--line);border-radius:14px;margin:10px 0;background:#fff}.top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.title{font-weight:900}.meta,.empty{font-size:14px;color:var(--muted)}.pill{display:inline-block;border-radius:999px;padding:4px 9px;background:#fff0f7;color:#a93672;font-size:12px;font-weight:800}.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:center;gap:4px;padding:8px;z-index:2}.tabs button{max-width:160px;background:#fff;color:#806b79;border:1px solid var(--line)}.tabs button.active{background:var(--pink);color:#fff}.hidden{display:none}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.catbox{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center;font-size:34px}.catbox span{display:block;font-size:12px;color:var(--muted);margin-top:4px}
</style></head><body><main>
<h1>🐾 まこペット 🐾</h1><div class="sub">ドリルを進めると、恐竜たまごから可愛いねこが育つよ</div>
<section id="home"><div class="card petroom"><div class="coin">🪙 <span id="coins">0</span></div><div id="petIcon" class="egg">🥚</div><div class="title" id="petName">ふしぎなたまご Lv.1</div><div class="bar"><div class="fill" id="expFill"></div></div><div class="meta">EXP <span id="expText">0/100</span></div><div class="speech" id="speech">今日のドリルで、たまごをあたためよう！</div><div class="actions"><button onclick="feed()">🍎 ごはん</button><button onclick="pet()">✋ なでる</button><button onclick="clean()">🧹 おそうじ</button></div></div><div class="card"><div class="top"><h2>今日やること</h2><span class="pill" id="todayRate">0%</span></div><div id="todayTasks"></div><button class="secondary" onclick="resetToday()">今日のチェックをリセット</button></div></section>
<section id="drillPage" class="hidden"><div class="card"><h2>ドリルを追加</h2><label>ドリル名</label><input id="name" placeholder="例：算数ラボ、Z会 国語、漢字ドリル"><div class="row3"><div><label>総ページ</label><input id="total" type="number" min="1" placeholder="60"></div><div><label>現在ページ</label><input id="current" type="number" min="0" placeholder="0"></div><div><label>1日ページ</label><input id="daily" type="number" min="1" placeholder="2"></div></div><div class="row"><div><label>締切日</label><input id="deadline" type="date"></div><div><label>優先度</label><select id="priority"><option>高</option><option selected>中</option><option>低</option></select></div></div><button onclick="addDrill()">追加する</button></div><div class="card"><h2>進捗</h2><div id="drills"></div></div><div class="card"><h2>全やること一覧</h2><div id="allTasks"></div></div></section>
<section id="bookPage" class="hidden"><div class="card"><h2>ねこ図鑑</h2><div class="grid" id="catBook"></div></div><div class="card"><h2>育成メモ</h2><p class="meta">1日やらないと毛並みがボサッ。2日で部屋が散らかる。3日でトイレ掃除ミニゲーム予定。死なない、消えない、待ってるだけ。</p></div></section>
</main><nav class="tabs"><button class="active" onclick="showTab('home',this)">🏠 ホーム</button><button onclick="showTab('drillPage',this)">📚 ドリル</button><button onclick="showTab('bookPage',this)">📖 図鑑</button></nav>
<script>
const KEY='mako-drills-v2', DONEKEY='mako-done-v2', PETKEY='mako-pet-v2';
const cats=[['🐱','しろねこ'],['🐈','みけねこ'],['🐈‍⬛','くろねこ'],['😺','ちゃとら'],['😸','にこねこ'],['😻','あまえんぼ'],['🙀','びっくりねこ'],['😽','おしゃれねこ'],['🌸','さくらねこ'],['⭐','ほしねこ'],['☁️','くもねこ'],['💎','ほうせきねこ']];
function load(){return JSON.parse(localStorage.getItem(KEY)||'[]')}function save(d){localStorage.setItem(KEY,JSON.stringify(d))}function loadDone(){return JSON.parse(localStorage.getItem(DONEKEY)||'{}')}function saveDone(d){localStorage.setItem(DONEKEY,JSON.stringify(d))}function loadPet(){return JSON.parse(localStorage.getItem(PETKEY)||'{"level":1,"exp":0,"coins":0,"hatched":false,"cat":null,"book":[],"dirty":0}')}function savePet(p){localStorage.setItem(PETKEY,JSON.stringify(p))}function today(){return new Date().toISOString().slice(0,10)}function pct(d){return Math.min(100,Math.round((Number(d.current||0)/Number(d.total||1))*100))}
function showTab(id,btn){['home','drillPage','bookPage'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render()}
function addDrill(){const name=document.getElementById('name').value.trim(),total=Number(document.getElementById('total').value);if(!name||!total){alert('ドリル名と総ページを入れてね');return}const data=load();data.push({id:Date.now(),name,total,current:Number(document.getElementById('current').value||0),daily:Number(document.getElementById('daily').value||1),deadline:document.getElementById('deadline').value,priority:document.getElementById('priority').value});save(data);['name','total','current','daily','deadline'].forEach(id=>document.getElementById(id).value='');render()}
function gainExp(n,msg){let p=loadPet();p.exp+=n;p.coins+=Math.ceil(n/5);while(p.exp>=100){p.exp-=100;p.level++;if(!p.hatched&&p.level>=3){const c=cats[Math.floor(Math.random()*8)];p.hatched=true;p.cat=c;if(!p.book.find(x=>x[1]===c[1]))p.book.push(c)}}savePet(p);renderPet(msg||'やったね！EXPとコインをゲット！')}
function toggleDone(id){const done=loadDone(),key=today()+'-'+id,was=!!done[key];done[key]=!was;saveDone(done);if(!was){const d=load().find(x=>x.id===id);updateCurrent(id,d?.daily||1);gainExp(20,'ドリル完了！たまごがあたたまったよ！')}else render()}
function updateCurrent(id,delta){const data=load().map(d=>{if(d.id===id)d.current=Math.max(0,Math.min(Number(d.total),Number(d.current)+Number(delta)));return d});save(data);render()}function setCurrent(id){const v=prompt('現在ページを入力');if(v===null)return;const data=load().map(d=>{if(d.id===id)d.current=Math.max(0,Math.min(Number(d.total),Number(v||0)));return d});save(data);render()}function removeDrill(id){if(confirm('このドリルを削除する？')){save(load().filter(d=>d.id!==id));render()}}function resetToday(){const done=loadDone();Object.keys(done).forEach(k=>{if(k.startsWith(today()+'-'))delete done[k]});saveDone(done);render()}function feed(){gainExp(5,'もぐもぐ。おいしい！')}function pet(){gainExp(3,'なでなでうれしいにゃ')}function clean(){let p=loadPet();p.dirty=0;p.coins+=3;savePet(p);renderPet('お部屋がピカピカになったよ！')}
function taskRange(d){const s=Number(d.current)+1,e=Math.min(Number(d.total),Number(d.current)+Number(d.daily||1));return s>Number(d.total)?'完了！':`P${s}〜${e}`}
function renderPet(msg){const p=loadPet();document.getElementById('coins').textContent=p.coins;document.getElementById('expFill').style.width=p.exp+'%';document.getElementById('expText').textContent=p.exp+'/100';const icon=document.getElementById('petIcon');if(p.hatched&&p.cat){icon.textContent=p.cat[0];icon.className='cat';document.getElementById('petName').textContent=p.cat[1]+' Lv.'+p.level}else{icon.textContent=p.level>=2?'🥚✨':'🥚';icon.className='egg';document.getElementById('petName').textContent='ふしぎなたまご Lv.'+p.level}document.getElementById('speech').textContent=msg||((p.hatched&&p.cat)?'今日も会いにきてくれてうれしいにゃ':'今日のドリルで、たまごをあたためよう！')}
function render(){const data=load().sort((a,b)=>({高:0,中:1,低:2}[a.priority]-{高:0,中:1,低:2}[b.priority]||(a.deadline||'9999').localeCompare(b.deadline||'9999'))),done=loadDone(),active=data.filter(d=>Number(d.current)<Number(d.total));const todayBox=document.getElementById('todayTasks');todayBox.innerHTML=active.length?'':'<div class="empty">今日のタスクは空。ドリルを追加してね。</div>';let finished=0;active.forEach(d=>{const key=today()+'-'+d.id;if(done[key])finished++;const div=document.createElement('div');div.className='task'+(done[key]?' done':'');div.innerHTML=`<input type="checkbox" ${done[key]?'checked':''} onchange="toggleDone(${d.id})"><div><b>${d.name}</b><br><span class="meta">${taskRange(d)}　<span class="pill">優先度${d.priority}</span></span></div>`;todayBox.appendChild(div)});document.getElementById('todayRate').textContent=active.length?Math.round(finished/active.length*100)+'%':'0%';const list=document.getElementById('drills');list.innerHTML=data.length?'':'<div class="empty">まだドリルがありません。</div>';data.forEach(d=>{const div=document.createElement('div');div.className='drill';div.innerHTML=`<div class="top"><div><div class="title">${d.name}</div><div class="meta">${d.current}/${d.total}ページ・残り${Math.max(0,d.total-d.current)}ページ</div></div><span class="pill">${pct(d)}%</span></div><div class="bar"><div class="fill" style="width:${pct(d)}%"></div></div><button class="small" onclick="updateCurrent(${d.id},1)">+1P</button><button class="small" onclick="updateCurrent(${d.id},${Number(d.daily||1)})">今日分完了</button><button class="small secondary" onclick="setCurrent(${d.id})">修正</button><button class="small secondary" onclick="removeDrill(${d.id})">削除</button>`;list.appendChild(div)});const all=document.getElementById('allTasks');all.innerHTML=active.length?'':'<div class="empty">未完了のやることはありません。えらい、ほぼ神。</div>';active.forEach(d=>{const chunks=[];for(let s=Number(d.current)+1;s<=Number(d.total);s+=Number(d.daily||1)){let e=Math.min(Number(d.total),s+Number(d.daily||1)-1);chunks.push(`P${s}${e!==s?'〜'+e:''}`)}const div=document.createElement('div');div.className='drill';div.innerHTML=`<div class="title">${d.name}</div><div class="meta">${chunks.slice(0,18).join(' / ')}${chunks.length>18?' ...':''}</div>`;all.appendChild(div)});const book=document.getElementById('catBook'),p=loadPet();book.innerHTML='';cats.forEach(c=>{const got=p.book?.find(x=>x[1]===c[1]);const div=document.createElement('div');div.className='catbox';div.innerHTML=(got?c[0]:'❔')+`<span>${got?c[1]:'？？？'}</span>`;book.appendChild(div)});renderPet()}
render();
</script></body></html>
